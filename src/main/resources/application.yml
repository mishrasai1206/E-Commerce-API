spring:
  application:
    name: E-Commerce-API

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


